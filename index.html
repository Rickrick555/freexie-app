                                    if (!rrt) {
                                        rrt = document.createElement('rt');
                                        targetRuby.appendChild(rrt);
                                    }
                                    rrt.textContent = newPinyin;
                                    saveCurrentPage();
                                }
                            }
                        } else if (lang === 'ja') {
                            const currentRt = targetRuby.querySelector('rt');
                            const newFurigana = prompt(`【${baseChar.trim()}】の読みを入力:`, currentRt ? currentRt.textContent : '');
                            if (newFurigana !== null) {
                                if (!currentRt) {
                                    targetRuby.insertAdjacentHTML('beforeend', `<rt>${newFurigana}</rt>`);
                                } else {
                                    currentRt.textContent = newFurigana;
                                }
                                saveCurrentPage();
                            }
                        }
                    }
                }
            });
        }

        // 独立したテキスト追加ボタン
        document.getElementById('btn-add-text').addEventListener('click', () => {
            const btn = document.getElementById('btn-add-text');
            if (window.isTextPlacementMode) {
                // If already in text placement mode, toggle it off
                window.isTextPlacementMode = false;
                container.style.cursor = brushSelect.value === 'text' ? 'text' : 'crosshair';
                btn.style.backgroundColor = '';
                btn.style.color = '';
                btn.style.borderColor = '';
                // Remove the temporary event listener if it was active
                container.removeEventListener('pointerdown', onTextPlace, { capture: true });
            } else {
                // Enter text placement mode
                window.isTextPlacementMode = true;
                container.style.cursor = 'crosshair';
                btn.style.backgroundColor = '#007aff'; // 選択中のフィードバック（青）
                btn.style.color = '#ffffff'; // 文字を白に
                btn.style.borderColor = '#007aff';

                // Add a one-time event listener to place the textbox
                container.addEventListener('pointerdown', onTextPlace, { capture: true, once: true });
            }
        });

        // Helper function for text placement mode
        const onTextPlace = (e) => {
            // Ensure click is within the canvas wrapper or container itself
            if (e.target !== container && !canvasWrapper.contains(e.target)) return;

            // Calculate position relative to the canvasWrapper
            const pt = getTransformedPoint(e); // Assuming getTransformedPoint returns coordinates relative to canvasWrapper
            createFloatingTextbox(pt.x, pt.y);

            window.isTextPlacementMode = false;
            container.style.cursor = brushSelect.value === 'text' ? 'text' : 'crosshair';
            const btn = document.getElementById('btn-add-text');
            btn.style.backgroundColor = '';
            btn.style.color = '';
            btn.style.borderColor = '';
        };


        // キャンバスの何もないところをクリックした時
        container.addEventListener('click', (e) => {
            if (e.target === container || e.target === draftCanvas || e.target === mainCanvas || e.target === textLayer) {

                // テキスト配置モードなら、その位置にテキストボックスを生成
                if (window.isTextPlacementMode) {
                    // This block is now handled by the onTextPlace listener,
                    // so we just need to ensure the mode is reset if click happens outside the specific listener.
                    // However, the `once: true` on `onTextPlace` means it will self-remove.
                    // If a click happens here, it means `onTextPlace` didn't fire (e.g., click on toolbar).
                    // So, we should just reset the mode.
                    window.isTextPlacementMode = false;
                    container.style.cursor = brushSelect.value === 'text' ? 'text' : 'crosshair';
                    const btn = document.getElementById('btn-add-text');
                    btn.style.backgroundColor = '';
                    btn.style.color = '';
                    btn.style.borderColor = '';
                    return;
                }

                // フォーカス解除のみ行う
                if (activeTextbox && e.target !== activeTextbox && !activeTextbox.contains(e.target)) {
                    setActiveTextbox(null);
                }
            }

            // ルビ(ruby/rt)のタップ編集を最優先で処理
            let target = e.target;
            const rubyNode = target.closest('ruby');
            if (rubyNode) {
                const rtNode = rubyNode.querySelector('rt');
                const baseText = Array.from(rubyNode.childNodes)
                    .filter(node => node.nodeType === Node.TEXT_NODE)
                    .map(node => node.textContent)
                    .join('');

                const currentRt = rtNode ? rtNode.textContent : "";
                const newRt = prompt(`「${baseText}」のルビを編集:`, currentRt);

                if (newRt !== null) {
                    if (newRt.trim() === '') {
                        // ルビを空にした場合は<ruby>タグを解除して元の文字に戻す
                        rubyNode.replaceWith(document.createTextNode(baseText));
                    } else if (rtNode) {
                        rtNode.textContent = newRt;
                    } else {
                        // rtがなかった場合、新しく作成
                        const newRtElement = document.createElement('rt');
                        newRtElement.textContent = newRt;
                        rubyNode.appendChild(newRtElement);
                    }
                    saveCurrentPage();
                }
                return; // ここで完了
            }
        });

        document.getElementById('input-font-size').addEventListener('input', (e) => {
            if (activeTextbox) {
                activeTextbox.style.fontSize = `${e.target.value}px`;
                saveCurrentPage();
            }
        });

        // 辞書不要・自己完結型のルビ処理
        async function applyRubyToEditor() {
            if (!activeTextbox) {
                alert("ルビを振るテキストボックスをタップして選択してください。");
                return;
            }

            const lang = document.getElementById('select-ruby-lang').value;

            if (lang === 'ja') {
                // 日本語: 辞書非搭載による手動ルビ振り
                const selection = window.getSelection();
                if (!selection.rangeCount) return;

                const range = selection.getRangeAt(0);
                const selectedText = selection.toString();

                if (!selectedText.trim() || !activeTextbox.contains(range.commonAncestorContainer)) {
                    alert("ルビを振りたい文字をなぞってハイライト（選択）してからボタンを押してください。\n※すでに振られているルビを修正したい場合は、そのルビを直接タップしてください。");
                    return;
                }

                const rubyText = prompt(`「${selectedText}」のルビを入力してください:`);
                if (rubyText !== null && rubyText.trim() !== '') {
                    // 選択範囲を<ruby>タグで安全にラップする
                    const rubyHtml = `<ruby>${selectedText}<rt>${rubyText}</rt></ruby>`;
                    document.execCommand('insertHTML', false, rubyHtml);
                    saveCurrentPage();
                }
            } else {
                // 中国語: 辞書不要（組込トライ木）のpinyin-proによる自動ルビ振り
                // 既存のrt等を無視してテキストを抽出
                function extractTextIgnoreRt(node) {
                    if (node.nodeType === Node.TEXT_NODE) return node.nodeValue;
                    if (node.nodeType === Node.ELEMENT_NODE) {
                        if (node.tagName === 'RT') return '';
                        if (node.tagName === 'BR') return '\n';
                        let text = '';
                        for (let child of node.childNodes) text += extractTextIgnoreRt(child);
                        if (node.tagName === 'DIV' || node.tagName === 'P') text += '\n';
                        return text;
                    }
                    return '';
                }

                let plainText = extractTextIgnoreRt(activeTextbox);
                plainText = plainText.replace(/\n{3,}/g, '\n\n').replace(/\n+$/, '');
                if (!plainText.trim()) return;

                document.getElementById('loading-overlay').style.display = 'flex';
                try {
                    const pinyinArray = window.pinyinPro.pinyin(plainText, { type: 'array' });
                    let htmlStr = '';
                    for (let i = 0; i < plainText.length; i++) {
                        const char = plainText[i];
                        if (char === '\n') {
                            htmlStr += '<br>';
                        } else if (/[\u4e00-\u9fa5]/.test(char)) {
                            htmlStr += `<ruby>${char}<rt>${pinyinArray[i] || ''}</rt></ruby>`;
                        } else {
                            htmlStr += char;
                        }
                    }
                    activeTextbox.innerHTML = htmlStr;
                    saveCurrentPage();
                } catch (e) {
                    console.error(e);
                    alert('ルビ振り中にエラーが発生しました。\n' + e.message);
                } finally {
                    document.getElementById('loading-overlay').style.display = 'none';
                }
            }
        }

        document.getElementById('btn-auto-ruby').addEventListener('click', applyRubyToEditor);

    </script>
